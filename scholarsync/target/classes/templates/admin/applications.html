<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin – Applications</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <h3 class="mb-4">📁 Manage All Applications</h3>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <div th:if="${applications.isEmpty()}" class="alert alert-info">
        No applications received yet.
    </div>

    <div class="table-responsive" th:unless="${applications.isEmpty()}">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Student</th>
                    <th>Email</th>
                    <th>CGPA</th>
                    <th>Scholarship</th>
                    <th>Date Applied</th>
                    <th>Status</th>
                    <th>Update</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="app, stat : ${applications}">
                    <td th:text="${stat.count}">1</td>
                    <td class="fw-semibold" th:text="${app.student.name}">Student</td>
                    <td class="text-muted small" th:text="${app.student.email}">email</td>
                    <td th:text="${app.student.cgpa}">3.80</td>
                    <td th:text="${app.scholarship.name}">Scholarship</td>
                    <td th:text="${app.dateApplied}">Date</td>
                    <td>
                        <span th:switch="${app.status.toString()}">
                            <span th:case="'PENDING'" class="badge bg-warning text-dark">⏳ Pending</span>
                            <span th:case="'APPROVED'" class="badge bg-success">✅ Approved</span>
                            <span th:case="'REJECTED'" class="badge bg-danger">❌ Rejected</span>
                        </span>
                    </td>
                    <td>
                        <form th:action="@{/admin/applications/{id}/status(id=${app.applId})}"
                              method="post" class="d-flex gap-1">
                            <select name="status" class="form-select form-select-sm" style="width:130px">
                                <option value="PENDING" th:selected="${app.status.toString() == 'PENDING'}">Pending</option>
                                <option value="APPROVED" th:selected="${app.status.toString() == 'APPROVED'}">Approved</option>
                                <option value="REJECTED" th:selected="${app.status.toString() == 'REJECTED'}">Rejected</option>
                            </select>
                            <button type="submit" class="btn btn-sm btn-primary">Update</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
