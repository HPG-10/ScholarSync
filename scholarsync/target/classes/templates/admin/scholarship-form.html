<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scholarship Form – ScholarSync</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0"
                        th:text="${scholarship.scholarshipId != null ? '✏️ Edit Scholarship' : '➕ Add New Scholarship'}">
                        Scholarship Form
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/scholarships/save}" method="post"
                          th:object="${scholarship}">
                        <!-- Hidden ID for editing -->
                        <input type="hidden" th:field="*{scholarshipId}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Scholarship Name *</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Provider / Organisation</label>
                            <input type="text" th:field="*{provider}" class="form-control"
                                   placeholder="e.g. Yayasan Khazanah">
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label fw-semibold">Minimum CGPA</label>
                                <input type="number" th:field="*{minCgpa}" class="form-control"
                                       min="0" max="4" step="0.01" placeholder="3.50">
                            </div>
                            <div class="col">
                                <label class="form-label fw-semibold">Amount (MYR)</label>
                                <input type="number" th:field="*{amount}" class="form-control"
                                       placeholder="5000.00" step="0.01">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label fw-semibold">Faculty (leave blank = all)</label>
                                <select th:field="*{faculty}" class="form-select">
                                    <option value="">All Faculties</option>
                                    <option value="Computer Science">Computer Science</option>
                                    <option value="Engineering">Engineering</option>
                                    <option value="Business">Business</option>
                                    <option value="Science">Science</option>
                                    <option value="Agriculture">Agriculture</option>
                                    <option value="Medicine">Medicine</option>
                                    <option value="Law">Law</option>
                                </select>
                            </div>
                            <div class="col">
                                <label class="form-label fw-semibold">Application Deadline</label>
                                <input type="date" th:field="*{deadline}" class="form-control">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea th:field="*{description}" class="form-control" rows="4"
                                      placeholder="Scholarship details, requirements, etc."></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">💾 Save Scholarship</button>
                            <a th:href="@{/admin/scholarships}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
