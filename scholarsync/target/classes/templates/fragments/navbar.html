<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">🎓 ScholarSync</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- Student nav -->
            <ul class="navbar-nav me-auto" sec:authorize="hasRole('STUDENT')">
                <li class="nav-item">
                    <a th:href="@{/dashboard}"
                       th:class="${currentUri == '/dashboard'} ? 'nav-link active' : 'nav-link'">
                        🏠 Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/scholarships}"
                       th:class="${currentUri != null and currentUri.startsWith('/scholarships')} ? 'nav-link active' : 'nav-link'">
                        📋 Scholarships
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/applications}"
                       th:class="${currentUri == '/applications'} ? 'nav-link active' : 'nav-link'">
                        📁 My Applications
                    </a>
                </li>
            </ul>

            <!-- Admin nav -->
            <ul class="navbar-nav me-auto" sec:authorize="hasRole('ADMIN')">
                <li class="nav-item">
                    <a th:href="@{/admin/scholarships}"
                       th:class="${currentUri != null and currentUri.startsWith('/admin/scholarships')} ? 'nav-link active' : 'nav-link'">
                        📋 Scholarships
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/applications}"
                       th:class="${currentUri == '/admin/applications'} ? 'nav-link active' : 'nav-link'">
                        📁 Applications
                    </a>
                </li>
            </ul>

            <!-- Right side -->
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <span class="nav-link text-white-50">
                        👤 <sec:authentication property="name"/>
                    </span>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-light">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
