# ============================================================
# ScholarSync - Application Configuration (Oracle)
# ============================================================

server.port=8080

# --- Database (Oracle) ---
# Change YOUR_HOST, YOUR_PORT, YOUR_SERVICE_NAME, username and password
spring.datasource.url=jdbc:oracle:thin:@//YOUR_HOST:YOUR_PORT/YOUR_SERVICE_NAME
spring.datasource.username=YOUR_USERNAME
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# --- Thymeleaf ---
spring.thymeleaf.cache=false

spring.application.name=ScholarSync
