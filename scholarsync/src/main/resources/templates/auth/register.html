<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register – ScholarSync</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100 py-4">
    <div class="card shadow p-4" style="width: 520px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">🎓 ScholarSync</h2>
            <p class="text-muted">Create your student account</p>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/register}" method="post" th:object="${student}">
            <div class="mb-3">
                <label class="form-label fw-semibold">Full Name</label>
                <input type="text" th:field="*{name}" class="form-control"
                       placeholder="Muhammad Iman Nuqman" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" th:field="*{email}" class="form-control"
                       placeholder="student@upm.edu.my" required>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label class="form-label fw-semibold">CGPA</label>
                    <input type="number" th:field="*{cgpa}" class="form-control"
                           placeholder="3.75" min="0" max="4" step="0.01" required>
                </div>
                <div class="col">
                    <label class="form-label fw-semibold">Faculty</label>
                    <select th:field="*{faculty}" class="form-select">
                        <option value="">-- Select Faculty --</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Business">Business</option>
                        <option value="Science">Science</option>
                        <option value="Agriculture">Agriculture</option>
                        <option value="Medicine">Medicine</option>
                        <option value="Law">Law</option>
                    </select>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label class="form-label fw-semibold">Nationality</label>
                    <select th:field="*{nationality}" class="form-select">
                        <option value="Malaysian">Malaysian</option>
                        <option value="International">International</option>
                    </select>
                </div>
                <div class="col">
                    <label class="form-label fw-semibold">Income Level</label>
                    <select th:field="*{incomeLevel}" class="form-select">
                        <option value="LOW">Low (B40)</option>
                        <option value="MEDIUM">Medium (M40)</option>
                        <option value="HIGH">High (T20)</option>
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" th:field="*{password}" class="form-control"
                       placeholder="Minimum 6 characters" required minlength="6">
            </div>
            <button type="submit" class="btn btn-success w-100">Create Account</button>
        </form>

        <hr>
        <p class="text-center mb-0">
            Already have an account? <a th:href="@{/login}">Login here</a>
        </p>
    </div>
</div>

</body>
</html>
