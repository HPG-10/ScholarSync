<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin – Scholarships</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>📋 Manage Scholarships</h3>
        <a th:href="@{/admin/scholarships/add}" class="btn btn-success">+ Add Scholarship</a>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <div th:if="${scholarships.isEmpty()}" class="alert alert-info">
        No scholarships listed yet. Click "Add Scholarship" to get started.
    </div>

    <div class="table-responsive" th:unless="${scholarships.isEmpty()}">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Provider</th>
                    <th>Min CGPA</th>
                    <th>Faculty</th>
                    <th>Amount</th>
                    <th>Deadline</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${scholarships}">
                    <td class="fw-semibold" th:text="${s.name}">Name</td>
                    <td th:text="${s.provider}">Provider</td>
                    <td th:text="${s.minCgpa != null ? s.minCgpa : '—'}">3.50</td>
                    <td th:text="${s.faculty != null ? s.faculty : 'All'}">CS</td>
                    <td th:text="${s.amount != null ? 'RM ' + s.amount : '—'}">RM 5000</td>
                    <td th:text="${s.deadline != null ? s.deadline : 'Open'}">Date</td>
                    <td>
                        <a th:href="@{/admin/scholarships/edit/{id}(id=${s.scholarshipId})}"
                           class="btn btn-sm btn-warning me-1">✏️ Edit</a>
                        <form th:action="@{/admin/scholarships/delete/{id}(id=${s.scholarshipId})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Delete this scholarship?')">
                            <button type="submit" class="btn btn-sm btn-danger">🗑️ Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
