<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Applications – ScholarSync</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <h3 class="mb-4">📁 My Scholarship Applications</h3>

    <div th:if="${applications.isEmpty()}" class="alert alert-info">
        You haven't applied for any scholarships yet.
        <a th:href="@{/scholarships}">Browse scholarships →</a>
    </div>

    <div class="table-responsive" th:unless="${applications.isEmpty()}">
        <table class="table table-hover align-middle">
            <thead class="table-primary">
                <tr>
                    <th>#</th>
                    <th>Scholarship</th>
                    <th>Provider</th>
                    <th>Amount</th>
                    <th>Date Applied</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="app, stat : ${applications}">
                    <td th:text="${stat.count}">1</td>
                    <td class="fw-semibold" th:text="${app.scholarship.name}">Name</td>
                    <td th:text="${app.scholarship.provider}">Provider</td>
                    <td class="text-success"
                        th:text="${app.scholarship.amount != null ? 'RM ' + app.scholarship.amount : '—'}">RM 5000</td>
                    <td th:text="${app.dateApplied}">Date</td>
                    <td>
                        <span th:switch="${app.status.toString()}">
                            <span th:case="'PENDING'" class="badge bg-warning text-dark">⏳ Pending</span>
                            <span th:case="'APPROVED'" class="badge bg-success">✅ Approved</span>
                            <span th:case="'REJECTED'" class="badge bg-danger">❌ Rejected</span>
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
