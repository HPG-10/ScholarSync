<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Scholarships – ScholarSync</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
    <h3 class="mb-4">📋 All Scholarships</h3>

    <!-- Search bar -->
    <form th:action="@{/scholarships}" method="get" class="mb-4">
        <div class="input-group">
            <input type="text" name="keyword" class="form-control form-control-lg"
                   th:value="${keyword}" placeholder="Search by scholarship name or provider...">
            <button class="btn btn-primary" type="submit">🔍 Search</button>
            <a th:href="@{/scholarships}" class="btn btn-outline-secondary">Clear</a>
        </div>
    </form>

    <div th:if="${scholarships.isEmpty()}" class="alert alert-info">
        No scholarships found. Try a different search.
    </div>

    <div class="table-responsive" th:unless="${scholarships.isEmpty()}">
        <table class="table table-hover align-middle">
            <thead class="table-primary">
                <tr>
                    <th>Scholarship</th>
                    <th>Provider</th>
                    <th>Min CGPA</th>
                    <th>Faculty</th>
                    <th>Amount</th>
                    <th>Deadline</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${scholarships}">
                    <td class="fw-semibold" th:text="${s.name}">Name</td>
                    <td th:text="${s.provider}">Provider</td>
                    <td th:text="${s.minCgpa != null ? s.minCgpa : '—'}">3.50</td>
                    <td>
                        <span class="badge bg-secondary"
                              th:text="${s.faculty != null ? s.faculty : 'All'}">All</span>
                    </td>
                    <td class="text-success fw-semibold"
                        th:text="${s.amount != null ? 'RM ' + s.amount : '—'}">RM 5000</td>
                    <td th:text="${s.deadline != null ? s.deadline : 'Open'}">Date</td>
                    <td>
                        <a th:href="@{/scholarships/{id}(id=${s.scholarshipId})}"
                           class="btn btn-sm btn-outline-primary">Details</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
